# CircleCI configuration for Android SDK
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

orbs:
  android: circleci/android@2.5.0
  slack: circleci/slack@6.1.3
  attentive: attentive-mobile/circleci-orb@0.0.11

# ========================
# Constants
# ========================
slack_channel_ci_alerts: &slack_channel_ci_alerts "eng-mobile-sdk-ci-alerts-android"
default_context: &default_context org-global

parameters:
  run_release:
    type: boolean
    default: false
  release_version:
    type: string
    default: ""

# Reusable environment variables
environment: &default_environment
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Xmx4g"
  JAVA_OPTS: "-Xmx4g"
  JVM_OPTS: "-Xmx4g"

# Reusable executor
executors:
  android-executor:
    docker:
      - image: cimg/android:2026.02.1
    resource_class: large
    environment:
      <<: *default_environment

# ========================
# Commands (Reusable)
# ========================
commands:
  notify-slack-on-failure:
    description: "Send Slack notification on job failure"
    steps:
      - run:
          name: Build Slack failure payload
          when: on_fail
          command: .circleci/slack-notify-failure.sh
      - slack/notify:
          channel: *slack_channel_ci_alerts
          event: fail
          custom: |
            ${SLACK_FAILURE_PAYLOAD}

jobs:
  lint:
    executor: android-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-v2-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "attentive-android-sdk/build.gradle" }}
            - gradle-v2-
      - run:
          name: Run Android Lint
          command: ./gradlew lintDebug
      - run:
          name: Run ktlint
          command: ./gradlew ktlintCheck
      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: gradle-v2-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "attentive-android-sdk/build.gradle" }}
      - store_artifacts:
          path: attentive-android-sdk/build/reports/lint-results-debug.html
          destination: lint-report.html
      - notify-slack-on-failure

  unit-test:
    executor: android-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-v2-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "attentive-android-sdk/build.gradle" }}
            - gradle-v2-
      - run:
          name: Run Unit Tests with Coverage
          command: ./gradlew testDebugUnitTest jacocoTestReport
      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: gradle-v2-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "attentive-android-sdk/build.gradle" }}
      # Store JUnit test results for CircleCI test insights
      - store_test_results:
          path: attentive-android-sdk/build/test-results/testDebugUnitTest
      # Store test report as artifact
      - store_artifacts:
          path: attentive-android-sdk/build/reports/tests/testDebugUnitTest
          destination: unit-test-report
      # Store JaCoCo coverage report
      - store_artifacts:
          path: attentive-android-sdk/build/reports/jacoco/jacocoTestReport
          destination: coverage-report
      # Store coverage XML for potential CI integration (Codecov, etc.)
      - persist_to_workspace:
          root: attentive-android-sdk/build/reports
          paths:
            - jacoco/jacocoTestReport/jacocoTestReport.xml
      - notify-slack-on-failure

  instrumented-test:
    machine:
      image: android:default
    resource_class: large
    environment:
      <<: *default_environment
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-v2-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "attentive-android-sdk/build.gradle" }}
            - gradle-v2-
      - android/create-avd:
          avd-name: test-avd
          system-image: system-images;android-30;google_apis;x86_64
          install: true
      - android/start-emulator:
          avd-name: test-avd
          no-window: true
          restore-gradle-cache-prefix: gradle-v2
          post-emulator-launch-assemble-command: ./gradlew :attentive-android-sdk:assembleDebugAndroidTest
      - run:
          name: Run Instrumented Tests
          command: ./gradlew :attentive-android-sdk:connectedDebugAndroidTest
          no_output_timeout: 20m
      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: gradle-v2-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "attentive-android-sdk/build.gradle" }}
      # Store instrumented test results
      - store_test_results:
          path: attentive-android-sdk/build/outputs/androidTest-results/connected
      # Store instrumented test report
      - store_artifacts:
          path: attentive-android-sdk/build/reports/androidTests/connected
          destination: instrumented-test-report
      # Store instrumented test coverage
      - store_artifacts:
          path: attentive-android-sdk/build/reports/coverage/androidTest/debug
          destination: instrumented-coverage-report
      - notify-slack-on-failure

  build:
    executor: android-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-v2-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "attentive-android-sdk/build.gradle" }}
            - gradle-v2-
      - run:
          name: Build SDK
          command: ./gradlew :attentive-android-sdk:assembleRelease
      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: gradle-v2-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "attentive-android-sdk/build.gradle" }}
      - store_artifacts:
          path: attentive-android-sdk/build/outputs/aar
          destination: aar
      - notify-slack-on-failure

  snapshot-test:
    executor: android-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-snapshot-v1-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "bonni/build.gradle" }}
            - gradle-snapshot-v1-
      - run:
          name: Verify Snapshot Tests
          command: ./gradlew :bonni:verifyRoborazziDebug
      - save_cache:
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
          key: gradle-snapshot-v1-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "bonni/build.gradle" }}
      - store_artifacts:
          path: bonni/build/outputs/roborazzi
          destination: snapshot-diffs
      - notify-slack-on-failure

  distribute-bonni:
    executor: android-executor
    steps:
      - checkout
      - run:
          name: Check if versionCode changed
          command: |
            # Get current versionCode
            CURRENT_VERSION=$(grep -E "versionCode\s*=" bonni/build.gradle | grep -oE "[0-9]+")

            # Fetch the base branch to compare against
            git fetch origin "$CIRCLE_BRANCH"

            # Get versionCode from the previous commit on this branch (before the push)
            PREVIOUS_VERSION=$(git show origin/$CIRCLE_BRANCH^:bonni/build.gradle 2>/dev/null | grep -E "versionCode\s*=" | grep -oE "[0-9]+" || echo "")

            echo "Current versionCode: $CURRENT_VERSION"
            echo "Previous versionCode: $PREVIOUS_VERSION"

            if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
              echo "versionCode unchanged, skipping distribution"
              circleci-agent step halt
            else
              echo "versionCode changed ($PREVIOUS_VERSION -> $CURRENT_VERSION), proceeding with distribution"
            fi
      - restore_cache:
          keys:
            - gradle-v2-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "attentive-android-sdk/build.gradle" }}
            - gradle-v2-
      - run:
          name: Decode Keystore
          command: echo "$BONNI_KEYSTORE_BASE64" | base64 -d > bonni/bonni-release.keystore
      - run:
          name: Build Bonni Release APK
          command: ./gradlew :bonni:assembleRelease
      - restore_cache:
          keys:
            - firebase-cli-v1
      - run:
          name: Install Firebase CLI
          command: |
            if ! command -v firebase &> /dev/null; then
              npm install -g firebase-tools
            fi
      - save_cache:
          paths:
            - ~/.npm
            - /usr/local/lib/node_modules/firebase-tools
          key: firebase-cli-v1
      - run:
          name: Validate APK
          command: |
            APK_PATH="bonni/build/outputs/apk/release/bonni-release.apk"
            if [ ! -f "$APK_PATH" ]; then
              echo "Error: APK not found at $APK_PATH"
              exit 1
            fi
            if [ ! -s "$APK_PATH" ]; then
              echo "Error: APK file is empty"
              exit 1
            fi
            echo "APK validated: $(ls -lh $APK_PATH)"
      - run:
          name: Upload to Firebase App Distribution
          command: |
            firebase appdistribution:distribute bonni/build/outputs/apk/release/bonni-release.apk \
              --app "$FIREBASE_APP_ID" \
              --groups "dev, product-+-eng" \
              --token "$FIREBASE_TOKEN"
      - store_artifacts:
          path: bonni/build/outputs/apk/release
          destination: bonni-apk
      - notify-slack-on-failure

  release:
    executor: android-executor
    steps:
      - checkout
      - attentive/app-based-github-token:
          github_app_client_id: ${GITHUB_APP_CLIENT_ID}
          github_app_private_key_base64: ${GITHUB_APP_PRIVATE_KEY_BASE64}
          github_app_installation_id: ${GITHUB_APP_INSTALLATION_ID}
      - run:
          name: Switch git remote to HTTPS with App token
          command: |
            git remote set-url origin "https://github.com/attentive-mobile/attentive-android-sdk.git"
            git config --local --replace-all \
              "http.https://github.com/.extraheader" \
              "Authorization: basic $(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 -w 0)"
      - restore_cache:
          keys:
            - gradle-v2-{{ checksum "gradle/libs.versions.toml" }}-{{ checksum "attentive-android-sdk/build.gradle" }}
            - gradle-v2-
      - run:
          name: Determine release version
          command: |
            if [ -n "<< pipeline.parameters.release_version >>" ]; then
              VERSION="<< pipeline.parameters.release_version >>"
            else
              VERSION=$(grep '^VERSION_NAME=' attentive-android-sdk/gradle.properties | cut -d'=' -f2)
            fi
            echo "export RELEASE_VERSION=$VERSION" >> "$BASH_ENV"

            if echo "$VERSION" | grep -qi "beta"; then
              echo "export IS_BETA=true" >> "$BASH_ENV"
              echo "Beta release detected — skipping GitHub Release"
            else
              echo "export IS_BETA=false" >> "$BASH_ENV"
            fi

            echo "Releasing: $VERSION"
      - run:
          name: Push release branch and open PR
          command: |
            git config user.name "circleci[bot]"
            git config user.email "circleci[bot]@users.noreply.github.com"

            BRANCH="release/$RELEASE_VERSION"
            git checkout -b "$BRANCH"
            sed -i "s/^VERSION_NAME=.*/VERSION_NAME=$RELEASE_VERSION/" attentive-android-sdk/gradle.properties
            git add attentive-android-sdk/gradle.properties

            if git diff --cached --quiet; then
              echo "gradle.properties already at $RELEASE_VERSION; skipping release branch + PR. Publishing from current commit."
            else
              git commit -m "Set version to $RELEASE_VERSION"
              git push --force origin "$BRANCH"

              HTTP_STATUS=$(curl -s -o /tmp/pr-response.json -w "%{http_code}" \
                -X POST \
                "https://api.github.com/repos/attentive-mobile/attentive-android-sdk/pulls" \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"title\": \"Release v$RELEASE_VERSION\",
                  \"body\": \"Automated release PR. Maven Central publish and GitHub Release are performed from this branch by CircleCI. Merge into main once verified.\",
                  \"head\": \"$BRANCH\",
                  \"base\": \"main\"
                }")

              echo "GitHub PR API status: $HTTP_STATUS"
              cat /tmp/pr-response.json
              echo

              if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
                exit 1
              fi
            fi
      - run:
          name: Clean
          command: ./gradlew clean
      - run:
          name: Publish to Maven Central
          command: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository
      - run:
          name: Create GitHub Release
          command: |
            if [ "$IS_BETA" = "true" ]; then
              echo "Skipping GitHub Release for beta version"
              exit 0
            fi
            git tag "$RELEASE_VERSION"
            git push origin "$RELEASE_VERSION"
            curl -sf -X POST \
              "https://api.github.com/repos/attentive-mobile/attentive-android-sdk/releases" \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"tag_name\": \"$RELEASE_VERSION\",
                \"name\": \"$RELEASE_VERSION\",
                \"generate_release_notes\": true
              }"
      - notify-slack-on-failure

workflows:
  build-and-test:
    unless: << pipeline.parameters.run_release >>
    jobs:
      - lint:
          context: *default_context
      - unit-test:
          context: *default_context
      - instrumented-test:
          context: *default_context
      - snapshot-test:
          context: *default_context
      - build:
          context: *default_context
          requires:
            - lint
            - unit-test
            - snapshot-test
      - distribute-bonni:
          context: *default_context
          requires:
            - build
          filters:
            branches:
              only:
                - main
                - develop

  release:
    when: << pipeline.parameters.run_release >>
    jobs:
      - release:
          context: *default_context
