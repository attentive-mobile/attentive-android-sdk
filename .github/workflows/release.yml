name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.1.3). Leave empty to use the version in gradle.properties.'
        required: false
        type: string
      branch:
        description: 'Branch to run the release pipeline against. Defaults to main.'
        required: false
        type: string
        default: 'main'

jobs:
  trigger-release:
    name: Trigger CircleCI Release
    runs-on: ubuntu-latest

    steps:
      - name: Trigger CircleCI release pipeline
        run: |
          curl -s -X POST \
            "https://circleci.com/api/v2/project/gh/attentive-mobile/attentive-android-sdk/pipeline" \
            -H "Circle-Token: ${{ secrets.CIRCLECI_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "branch": "${{ inputs.branch }}",
              "parameters": {
                "run_release": true,
                "release_version": "${{ inputs.version }}"
              }
            }'
